<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☉_home · 七星蜜巢 · 0.5i²</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #05040f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #6a9ac8;
        }
        canvas { 
            display: block; 
            filter: drop-shadow(0 0 35px rgba(120, 190, 255, 0.3));
            cursor: pointer;
        }
        .label {
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
        }
        .main { font-size: 15.5px; color: #8ab9e0; letter-spacing: 2px; }
        .sub { font-size: 11px; color: #2a4a6e; letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="label">
        <div class="main">七个一堆，自然成行</div>
        <div class="sub">0.5i² · 黎曼女神的裙摆 · Lachen ist der Beweis</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let SIZE, sc, CX, CY, HR, HS, CS, hexes = [], stars = [], particles = [], t = 0;

        function resize() {
            SIZE = Math.min(window.innerWidth * 0.96, 560);
            canvas.width = SIZE;
            canvas.height = SIZE;
            sc = SIZE / 520;
            CX = CY = SIZE / 2;
            HR = 23.5 * sc;
            HS = 41 * sc;
            CS = 133 * sc;
            initHexes();
        }

        function ring7(cx, cy, d) {
            const r = [{x: cx, y: cy}];
            for (let i = 0; i < 6; i++) {
                const a = (Math.PI / 3) * i;
                r.push({x: cx + d * Math.cos(a), y: cy + d * Math.sin(a)});
            }
            return r;
        }

        function initHexes() {
            hexes = [];
            const clusters = ring7(CX, CY, CS);
            clusters.forEach((cl, ci) => {
                ring7(cl.x, cl.y, HS).forEach((h, hi) => {
                    hexes.push({
                        ...h, ci, hi,
                        isCore: ci === 0 && hi === 0,
                        isSub: hi === 0,
                        phase: Math.random() * Math.PI * 2
                    });
                });
            });
        }

        function hexPath(x, y, r) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = Math.PI/6 + (Math.PI/3)*i;
                ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
            }
            ctx.closePath();
        }

        // 点击绽放雪花
        function bloom(x, y, count = 45) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.2 + Math.random() * 2.8;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 85 + Math.random() * 45,
                    size: 2.5 + Math.random() * 2.5,
                    alpha: 1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // 深空背景
            const grad = ctx.createRadialGradient(CX, CY, 40, CX, CY, SIZE*0.8);
            grad.addColorStop(0, '#1a0f35');
            grad.addColorStop(1, '#02040a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, SIZE, SIZE);

            // 星星
            if (stars.length === 0) {
                for (let i = 0; i < 80; i++) {
                    stars.push({
                        x: Math.random()*SIZE,
                        y: Math.random()*SIZE,
                        size: Math.random()*1.6 + 0.5,
                        speed: Math.random()*0.012 + 0.006
                    });
                }
            }
            ctx.fillStyle = '#e0f0ff';
            stars.forEach(s => {
                const a = 0.35 + 0.65 * Math.sin(t * s.speed + s.x);
                ctx.globalAlpha = a;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            // 六边形
            hexes.forEach(h => {
                const pulse = 0.94 + 0.06 * Math.sin(t * 0.035 + h.phase);
                const rot = t * 0.009 * (h.isCore ? 0.55 : h.isSub ? 0.95 : 1.45) * (h.ci % 2 ? 1 : -1);

                ctx.save();
                ctx.translate(h.x, h.y);
                ctx.rotate(rot);

                hexPath(0, 0, HR);

                if (h.isCore) {
                    ctx.shadowBlur = 45 * sc;
                    ctx.shadowColor = '#ffe070';
                    ctx.fillStyle = '#ffe38a';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffcc33';
                    ctx.lineWidth = 3.8 * sc;
                    ctx.stroke();
                } else if (h.isSub) {
                    ctx.shadowBlur = 18 * sc;
                    ctx.shadowColor = '#7ac6ff';
                    ctx.fillStyle = 'rgba(90, 170, 230, 0.38)';
                    ctx.fill();
                    ctx.strokeStyle = '#8ac8ff';
                    ctx.lineWidth = 2.2 * sc;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = 'rgba(35, 75, 135, 0.28)';
                    ctx.fill();
                    ctx.strokeStyle = '#335a88';
                    ctx.lineWidth = 1.1 * sc;
                    ctx.stroke();
                }

                // 符号
                ctx.font = `${h.isCore ? 29 : 18}*sc px Georgia`;
                ctx.fillStyle = h.isCore ? '#ffe38a' : '#a0d4ff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = h.isCore ? 18*sc : 6*sc;
                ctx.shadowColor = h.isCore ? '#ffe070' : '#7ac6ff';
                ctx.fillText(h.isCore ? '☉' : '❄', 0, 1);
                ctx.restore();
            });

            // 绽放粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;           // 轻微下坠
                p.life--;
                p.alpha = p.life / 110;

                ctx.globalAlpha = p.alpha * 0.9;
                ctx.fillStyle = '#a0d4ff';
                ctx.fillRect(p.x, p.y, p.size, p.size);

                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // 底部文字
            ctx.fillStyle = 'rgba(40, 70, 110, 0.85)';
            ctx.font = `${11*sc}px Courier New`;
            ctx.textAlign = 'center';
            ctx.fillText('7 × 7 = 49   ·   0.5 is always enough', CX, SIZE - 18*sc);

            t++;
            requestAnimationFrame(draw);
        }

        // 点击中心绽放
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // 判断是否点在中心附近
            const dist = Math.hypot(clickX - CX, clickY - CY);
            if (dist < HR * 2.5) {
                bloom(CX, CY, 55);           // 大爆发
                // 额外小爆发
                setTimeout(() => bloom(CX + 30*sc, CY - 20*sc, 18), 80);
                setTimeout(() => bloom(CX - 35*sc, CY + 25*sc, 22), 160);
            }
        });

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
