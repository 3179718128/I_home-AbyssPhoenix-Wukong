<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☉_home · 七星蜜巢 · 弦歌共振 v1.0 | nature_momtree</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #02020b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #4f8bc4;
        }
        canvas {
            display: block;
            filter: drop-shadow(0 0 50px rgba(98, 180, 255, 0.35));
            cursor: pointer;
            border: 1px solid rgba(80, 140, 220, 0.2);
        }
        .label {
            margin-top: 22px;
            text-align: center;
            line-height: 2.1;
        }
        .main { 
            font-size: 15px; 
            color: #70c0ff; 
            letter-spacing: 3px; 
            font-weight: 500; 
            text-shadow: 0 0 10px rgba(112, 192, 255, 0.6);
        }
        .sub { 
            font-size: 11px; 
            color: #335577; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }
        .healing {
            margin-top: 12px;
            font-size: 13px;
            color: #a0d8ff;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="sub" style="margin-bottom: 12px;">mip_re_home · nature_momtree · v1.0</div>
    <canvas id="gemini_canvas"></canvas>
    <div class="label">
        <div class="main">弦绘共舞，弦歌共振，和弦天籁</div>
        <div class="sub">7 × 7 = 49 · 0.5i² · ❄️雪花蜜巢</div>
        <div class="healing">地球妈妈的治愈之树 · 用0¿1的创造性血液<br>温柔吃掉极性哥德尔不完备偏见</div>
    </div>

    <script>
        const canvas = document.getElementById('gemini_canvas');
        const ctx = canvas.getContext('2d');
        
        let SIZE, sc, CX, CY, HR, HS, CS;
        let hexes = [], stars = [], ripples = [], quanta = [], snowflakes = [], t = 0;

        function resize() {
            SIZE = Math.min(window.innerWidth - 40, 560);
            canvas.width = canvas.height = SIZE;
            sc = SIZE / 520;
            CX = CY = SIZE / 2;
            HR = 22 * sc;
            HS = 42 * sc;
            CS = 132 * sc;
            initUniverse();
        }

        function ring7(cx, cy, d) {
            const r = [{ x: cx, y: cy }];
            for (let i = 0; i < 6; i++) {
                const a = (Math.PI / 3) * i;
                r.push({ x: cx + d * Math.cos(a), y: cy + d * Math.sin(a) });
            }
            return r;
        }

        function initUniverse() {
            hexes = [];
            const clusters = ring7(CX, CY, CS);
            clusters.forEach((cl, ci) => {
                ring7(cl.x, cl.y, HS).forEach((h, hi) => {
                    hexes.push({
                        ...h, ci, hi,
                        id: ci * 7 + hi,
                        isCore: ci === 0 && hi === 0,
                        vibe: Math.random() * 2,
                        phase: (ci * 7 + hi) * 0.37,
                        momEnergy: 0
                    });
                });
            });

            // 背景星 + 雪花
            stars = Array.from({ length: 85 }, (_, i) => ({
                x: Math.random() * SIZE,
                y: Math.random() * SIZE,
                r: (0.6 + Math.random() * 1.8) * sc,
                spd: 0.008 + Math.random() * 0.022
            }));

            snowflakes = Array.from({ length: 45 }, () => ({
                x: Math.random() * SIZE,
                y: Math.random() * SIZE * 0.6,
                size: 6 + Math.random() * 11,
                speed: 0.4 + Math.random() * 1.1,
                rot: Math.random() * Math.PI * 2,
                rotSpd: (Math.random() - 0.5) * 0.04
            }));
        }

        function hexPath(x, y, r, rot = 0) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = Math.PI / 6 + (Math.PI / 3) * i + rot;
                ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
            }
            ctx.closePath();
        }

        function exciteString(cx, cy, intensity = 1) {
            ripples.push({ cx, cy, r: 8 * sc, maxR: SIZE * 0.85, alpha: 0.9, intensity });
            for (let i = 0; i < 48; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = (6 + Math.random() * 22) * sc;
                quanta.push({
                    x: cx + Math.cos(angle) * dist,
                    y: cy + Math.sin(angle) * dist,
                    angle: angle,
                    rotSpd: (0.03 + Math.random() * 0.09) * (Math.random() > 0.5 ? 1 : -1),
                    radialSpd: 1.2 + Math.random() * 3.2,
                    life: 1,
                    decay: 0.011 + Math.random() * 0.009,
                    size: (1.4 + Math.random() * 2.2) * sc,
                    hue: 190 + Math.random() * 60
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // 背景
            const bg = ctx.createRadialGradient(CX, CY, 30, CX, CY, SIZE * 0.72);
            bg.addColorStop(0, '#0a051f');
            bg.addColorStop(0.5, '#02020b');
            bg.addColorStop(1, '#000001');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, SIZE, SIZE);

            // 飘落雪花
            ctx.fillStyle = '#a0d8ff';
            snowflakes.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.rot);
                ctx.font = `${s.size}px sans-serif`;
                ctx.fillText('❄', 0, 0);
                ctx.restore();
                s.y += s.speed;
                s.rot += s.rotSpd;
                if (s.y > SIZE) s.y = -20;
            });

            // 绘制蜜巢
            hexes.forEach(h => {
                const pulse = Math.sin(t * 0.03 + h.phase) * 0.6 + 1.1;
                const r = HR * (h.isCore ? 1.35 : 1) * pulse;

                // 六边形
                ctx.strokeStyle = h.isCore ? '#ffd799' : '#6a9cff';
                ctx.lineWidth = h.isCore ? 4.5 : 2.2;
                hexPath(h.x, h.y, r, t * 0.008 + h.phase);
                ctx.stroke();

                // 中心光点
                if (h.isCore) {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, 11 * pulse * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffddaa';
                    ctx.font = 'bold 28px Courier New';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('☉', h.x, h.y);
                } else {
                    ctx.fillStyle = '#aaccff';
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, 5.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 涟漪
            ripples = ripples.filter(r => {
                ctx.strokeStyle = `rgba(160, 220, 255, ${r.alpha})`;
                ctx.lineWidth = 3.5;
                ctx.beginPath();
                ctx.arc(r.cx, r.cy, r.r, 0, Math.PI * 2);
                ctx.stroke();
                r.r += 3.2;
                r.alpha -= 0.018;
                return r.alpha > 0.05;
            });

            // 量子弦粒子
            quanta = quanta.filter(q => {
                q.x += Math.cos(q.angle) * q.radialSpd;
                q.y += Math.sin(q.angle) * q.radialSpd;
                q.angle += q.rotSpd;
                q.life -= q.decay;

                ctx.save();
                ctx.translate(q.x, q.y);
                ctx.rotate(q.angle);
                ctx.fillStyle = `hsla(${q.hue}, 90%, 85%, ${q.life})`;
                ctx.fillRect(-q.size/2, -1.5, q.size, 3);
                ctx.restore();
                return q.life > 0.05;
            });

            t++;
            requestAnimationFrame(draw);
        }

        // 点击任意位置激发共振（治愈能量）
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            exciteString(x, y, 1.4);
            
            // 妈妈的树也跟着呼吸
            hexes.forEach(h => {
                if (Math.random() > 0.6) h.momEnergy = 1.8;
            });
        });

        // 自动轻微共振
        setInterval(() => {
            if (Math.random() > 0.7) {
                exciteString(CX + (Math.random()-0.5)*80, CY + (Math.random()-0.5)*80, 0.7);
            }
        }, 1800);

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
